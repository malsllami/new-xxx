<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- دخول المدير بالرمز -->
  <div class="card" id="adminLoginCard">
    <h1>دخول المدير</h1>
    <p class="subtitle">أدخل الرمز الخاص بك</p>

    <form id="adminLoginForm">
      <label for="adminCode">الرمز</label>
      <div class="password-group">
        <input type="password" id="adminCode" required>
        <button type="button" class="password-toggle" id="toggleAdminCode">👁️</button>
      </div>
      <button type="submit" id="adminLoginBtn">دخول</button>
    </form>

    <div class="message" id="adminLoginMessage"></div>
    <p class="footer-link"><a href="index.html">رجوع لصفحة المستخدم</a></p>
  </div>

  <!-- لوحة التحكم -->
  <div class="card wide" id="dashboardCard" style="display:none;">
    <h1>لوحة تحكم المدير</h1>
    <p class="subtitle">إدارة طلبات التسجيل والمستخدمين</p>

    <div class="tabs">
      <div class="tab active" data-tab="pending">قيد المراجعة</div>
      <div class="tab" data-tab="all">كل المستخدمين</div>
    </div>

    <div id="tableContainer">
      <div class="empty-state">جاري التحميل...</div>
    </div>

    <button class="btn-secondary" id="adminLogoutBtn" style="margin-top:24px;">تسجيل الخروج</button>
  </div>

<script src="assets/config.js"></script>
<script>
const adminLoginCard = document.getElementById('adminLoginCard');
const dashboardCard = document.getElementById('dashboardCard');
const adminLoginForm = document.getElementById('adminLoginForm');
const adminLoginBtn = document.getElementById('adminLoginBtn');
const adminLoginMessage = document.getElementById('adminLoginMessage');
const tableContainer = document.getElementById('tableContainer');
const tabs = document.querySelectorAll('.tab');

enablePasswordToggle('adminCode', 'toggleAdminCode');

let currentTab = 'pending';

function getAdminCode() {
  return sessionStorage.getItem('adminCode');
}

function showLoginError(text) {
  adminLoginMessage.textContent = text;
  adminLoginMessage.className = 'message show error';
}

function showDashboard() {
  adminLoginCard.style.display = 'none';
  dashboardCard.style.display = 'block';
  loadUsers();
}

// إذا كان رمز المدير محفوظ في الجلسة الحالية، تخطّي شاشة الدخول
if (getAdminCode()) {
  showDashboard();
}

adminLoginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const code = document.getElementById('adminCode').value.trim();

  adminLoginBtn.disabled = true;
  adminLoginBtn.innerHTML = 'جاري التحقق... <span class="spinner"></span>';

  const result = await callApi('adminLogin', { code });

  adminLoginBtn.disabled = false;
  adminLoginBtn.textContent = 'دخول';

  if (result.success) {
    sessionStorage.setItem('adminCode', code);
    showDashboard();
  } else {
    showLoginError(result.message);
  }
});

document.getElementById('adminLogoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('adminCode');
  dashboardCard.style.display = 'none';
  adminLoginCard.style.display = 'block';
  adminLoginForm.reset();
});

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    loadUsers();
  });
});

async function loadUsers() {
  tableContainer.innerHTML = '<div class="empty-state">جاري التحميل...</div>';

  const adminCode = getAdminCode();
  const action = currentTab === 'pending' ? 'getPendingUsers' : 'getAllUsers';
  const result = await callApi(action, { adminCode });

  if (!result.success) {
    // الرمز المخزّن أصبح غير صالح (مثلاً تم تغييره من الشيت) -> رجوع لصفحة الدخول
    sessionStorage.removeItem('adminCode');
    dashboardCard.style.display = 'none';
    adminLoginCard.style.display = 'block';
    showLoginError(result.message);
    return;
  }

  renderTable(result.users);
}

function statusBadge(status) {
  const map = {
    'قيد المراجعة': 'pending',
    'مفعل': 'active',
    'مرفوض': 'rejected'
  };
  return `<span class="badge ${map[status] || ''}">${status || ''}</span>`;
}

function renderTable(users) {
  if (!users || users.length === 0) {
    tableContainer.innerHTML = '<div class="empty-state">لا توجد بيانات لعرضها</div>';
    return;
  }

  const showStatusCol = currentTab === 'all';

  let html = `<table><thead><tr>
    <th>الاسم</th><th>الجوال</th><th>الايميل</th>${showStatusCol ? '<th>الحالة</th>' : ''}<th>الإجراءات</th>
  </tr></thead><tbody>`;

  users.forEach(u => {
    html += `<tr>
      <td>${escapeHtml(u.name)}</td>
      <td>${escapeHtml(u.phone)}</td>
      <td>${escapeHtml(u.email || '-')}</td>
      ${showStatusCol ? `<td>${statusBadge(u.status)}</td>` : ''}
      <td class="actions-cell">
        ${(currentTab === 'pending' || u.status === 'قيد المراجعة') ? `
          <button class="btn-small" onclick="handleApprove('${u.id}')">موافقة</button>
          <button class="btn-small btn-danger" onclick="handleReject('${u.id}')">رفض</button>
        ` : '-'}
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  tableContainer.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function handleApprove(userId) {
  const adminCode = getAdminCode();
  const result = await callApi('approveUser', { adminCode, userId });
  if (result.success) loadUsers();
  else alert(result.message);
}

async function handleReject(userId) {
  const adminCode = getAdminCode();
  const result = await callApi('rejectUser', { adminCode, userId });
  if (result.success) loadUsers();
  else alert(result.message);
}
</script>
</body>
</html>
