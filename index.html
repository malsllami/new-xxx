<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- نموذج تسجيل الدخول -->
  <div class="card" id="loginCard">
    <h1>تسجيل الدخول</h1>
    <p class="subtitle">أدخل رقم جوالك للدخول إلى حسابك</p>

    <form id="loginForm">
      <label for="phone">رقم الجوال</label>
      <input type="tel" id="phone" placeholder="05xxxxxxxx" required>

      <button type="submit" id="loginBtn">دخول</button>
    </form>

    <div class="message" id="loginMessage"></div>

    <p class="footer-link">ليس لديك حساب؟ <a href="register.html">سجّل الآن</a></p>
    <p class="footer-link"><a href="admin.html">دخول المدير</a></p>
  </div>

  <!-- بعد تسجيل الدخول -->
  <div class="card" id="welcomeCard" style="display:none;">
    <h1 id="welcomeTitle">مرحباً</h1>
    <p class="subtitle" id="welcomeSubtitle"></p>
    <button class="btn-secondary" id="logoutBtn">تسجيل الخروج</button>
  </div>

<script src="assets/config.js"></script>
<script>
const loginCard = document.getElementById('loginCard');
const welcomeCard = document.getElementById('welcomeCard');
const loginForm = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const loginMessage = document.getElementById('loginMessage');

function showMessage(el, text, type) {
  el.textContent = text;
  el.className = 'message show ' + type;
}

function showWelcome(user) {
  loginCard.style.display = 'none';
  welcomeCard.style.display = 'block';
  document.getElementById('welcomeTitle').textContent = 'مرحباً ' + user.name;
  document.getElementById('welcomeSubtitle').textContent = user.phone;
}

// إذا كان المستخدم مسجل دخول مسبقاً (محفوظ في الجهاز)
const savedUser = localStorage.getItem('currentUser');
if (savedUser) {
  showWelcome(JSON.parse(savedUser));
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const phone = document.getElementById('phone').value.trim();

  loginBtn.disabled = true;
  loginBtn.innerHTML = 'جاري الدخول... <span class="spinner"></span>';
  loginMessage.className = 'message';

  const result = await callApi('login', { phone });

  loginBtn.disabled = false;
  loginBtn.textContent = 'دخول';

  if (result.success) {
    localStorage.setItem('currentUser', JSON.stringify(result.user));
    showWelcome(result.user);
  } else {
    showMessage(loginMessage, result.message, 'error');
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('currentUser');
  welcomeCard.style.display = 'none';
  loginCard.style.display = 'block';
  loginForm.reset();
});
</script>
</body>
</html>
